version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: listmonk-postgres
    environment:
      POSTGRES_DB: ${LISTMONK_DB_DATABASE:-listmonk}
      POSTGRES_USER: ${LISTMONK_DB_USER:-listmonk}
      POSTGRES_PASSWORD: ${LISTMONK_DB_PASSWORD:-listmonk_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LISTMONK_DB_USER:-listmonk} -d ${LISTMONK_DB_DATABASE:-listmonk}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  listmonk:
    build:
      context: .
      dockerfile: Dockerfile.geo.fixed
    container_name: listmonk-app
    environment:
      LISTMONK_app__address: "0.0.0.0:9000"
      LISTMONK_app__admin_username: ${LISTMONK_APP_ADMIN_USERNAME:-admin}
      LISTMONK_app__admin_password: ${LISTMONK_APP_ADMIN_PASSWORD:-admin123}
      LISTMONK_db__host: postgres
      LISTMONK_db__port: 5432
      LISTMONK_db__user: ${LISTMONK_DB_USER:-listmonk}
      LISTMONK_db__password: ${LISTMONK_DB_PASSWORD:-listmonk_secure_password}
      LISTMONK_db__database: ${LISTMONK_DB_DATABASE:-listmonk}
      LISTMONK_db__ssl_mode: disable
      LISTMONK_db__max_open: 25
      LISTMONK_db__max_idle: 25
      LISTMONK_db__max_lifetime: "300s"
    ports:
      - "${LISTMONK_PORT:-9000}:9000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - listmonk_uploads:/listmonk/uploads
      - ./config.toml:/listmonk/config.toml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  adminer:
    image: adminer:4.8.1
    container_name: listmonk-adminer
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "${ADMINER_PORT:-8083}:8080"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  listmonk_uploads:
    driver: local

networks:
  default:
    name: listmonk-network