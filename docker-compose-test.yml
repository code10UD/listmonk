services:
  db:
    image: postgres:17-alpine
    container_name: listmonk_db_test
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: listmonk
      POSTGRES_PASSWORD: listmonk
      POSTGRES_DB: listmonk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listmonk"]
      interval: 5s
      timeout: 5s
      retries: 12
